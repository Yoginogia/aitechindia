name: Test Twitter API
on:
  push:
    paths:
      - 'trigger_twitter_test.txt'

permissions:
  contents: write

jobs:
  test-twitter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tweepy
        run: pip install tweepy
      - name: Run Test
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          python -c "
          import tweepy, os, datetime
          try:
              k1 = os.environ.get('TWITTER_API_KEY', '').strip()
              k2 = os.environ.get('TWITTER_API_SECRET', '').strip()
              k3 = os.environ.get('TWITTER_ACCESS_TOKEN', '').strip()
              k4 = os.environ.get('TWITTER_ACCESS_SECRET', '').strip()
              
              client = tweepy.Client(
                  consumer_key=k1,
                  consumer_secret=k2,
                  access_token=k3,
                  access_token_secret=k4
              )
              
              client.create_tweet(text='Testing AITechNews Auto-post API Integration! 🚀 #TechNews')
              msg = f'[{datetime.datetime.now()}] SUCCESS! Test tweet posted successfully!'
              with open('twitter_test_result.txt', 'w') as f:
                  f.write(msg)
          except Exception as e:
              with open('twitter_test_result.txt', 'w') as f:
                  f.write(f'[{datetime.datetime.now()}] ERROR: {e}\nLengths: {len(k1)}, {len(k2)}, {len(k3)}, {len(k4)}')
          "
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add twitter_test_result.txt || true
          git commit -m "Auto: Update Twitter test result with timestamp" || true
          git push || true
